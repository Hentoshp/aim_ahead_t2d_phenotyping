# Global configuration
# Paths resolve ${AIREADI_DATA_PATH} at runtime via dotenv

version: 0.1

data:
  raw_path: "${AIREADI_DATA_PATH}/raw/"
  processed_path: "${AIREADI_DATA_PATH}/processed/"
  intermediates_path: "${AIREADI_DATA_PATH}/processed/intermediates/"
  qc_reports_path: "${AIREADI_DATA_PATH}/processed/qc_reports/"
  artifacts_path: "${AIREADI_DATA_PATH}/artifacts/"

module1:
  normalization: "standard_scaler"
  missing_strategy: "drop"          # Options: drop | impute (TODO) | none
  artifacts:
    level: "standard"               # Options: standard | debug
    write_default_aliases: false    # Legacy root clustering_matrix alias; keep off once view paths are adopted
    save_view_raw_matrices: true
    save_common_raw_matrix: false
  clustering_views:
    cohort_policy: "common"         # Options: common
    default_view: "wearable_environment"
    views:
      wearable:
        include_prefixes: ["heart_rate_", "oxygen_sat_", "physical_activity_", "calories_", "respiratory_rate_", "stress_", "sleep_"]
      environment:
        include_prefixes: ["env_"]
      wearable_environment:
        include_prefixes: ["heart_rate_", "oxygen_sat_", "physical_activity_", "calories_", "respiratory_rate_", "stress_", "sleep_", "env_"]
  qc_thresholds:
    wearable:
      min_heart_rate_valid_hour_coverage: 0.70
      stress_min: 0
      stress_max: 100
      oxygen_saturation_min: 50
      oxygen_saturation_max: 100
      heart_rate_min: 25
      heart_rate_max: 250
      respiratory_rate_min: 4
      respiratory_rate_max: 60
      physical_activity_min: 0
      calories_min: 0
      sleep_duration_min_hours: 0
      sleep_duration_max_hours: 24
      # TODO: add per-modality valid day/hour thresholds if needed
    cgm:
      glucose_min_mg_dl: 40
      glucose_max_mg_dl: 400
      min_wear_days: 7
    environment:
      pm1_min: 0
      pm1_max: 65536
      pm2_5_min: 0
      pm2_5_max: 65536
      pm10_min: 0
      pm10_max: 65536
      humidity_min: 0
      humidity_max: 100
      temperature_min_c: -10
      temperature_max_c: 50
      voc_min: 0
      voc_max: 500
      nox_min: 0
      nox_max: 500
      min_valid_hours: 168           # 70% of 10-day window = 168 hours
  environment_feature_summaries:
    voc_elevation_threshold: 150     # meaningful elevation above adaptive baseline (index units)
    nox_elevation_threshold: 20      # meaningful elevation per Sensirion documentation (index units)
    light_total_activity_threshold: 0     # any non-zero summed light counts as active

module2:
  k_range: [3, 4]
  covariance_types: ["diag", "tied"]
  bootstrap_B: 1000
  bootstrap_early_stop_threshold: 0.001
  pca_variance_threshold: 0.80
  pca_mode: "variance"          # options: variance | fixed
  pca_n_components: null        # used when pca_mode == fixed
  corr_prune: true
  corr_threshold: 0.9
  gmm_reg_covar: 0.001
  random_seed: 42
  artifacts:
    level: "standard"               # Options: standard | debug
    compute_shap: false             # Enable for final interpretation runs, not default exploration
    save_json_mirrors: false
  exploration:
    views: ["wearable", "environment", "wearable_environment"]
    experiments:
      - name: "stability_v1"
        k_range: [3, 4]
        covariance_types: ["diag", "tied"]
        pca_mode: "variance"
        pca_variance_threshold: 0.80
        pca_n_components: null
        gmm_reg_covar: 0.001
      - name: "k3_only"
        k_range: [3]
        covariance_types: ["diag", "tied"]
        pca_mode: "variance"
        pca_variance_threshold: 0.80
        pca_n_components: null
        gmm_reg_covar: 0.001
  selection:
    min_base_prop_high_confidence: 0.70
    min_bootstrap_mean_ari: 0.50
    preferred_min_cluster_fraction: 0.10
    acceptable_min_cluster_fraction: 0.05
    view_priority: ["wearable_environment", "environment", "wearable"]

module3:
  primary_model: "threshold"
  severity_covariates: ["hba1c_stratum", "diabetes_stage", "site"]
  hba1c_strata_boundaries:
    well_controlled: 7.0
    moderate: 9.0
  primary_outcome: "glycemic_cv"
  cv_clinical_threshold: 36.0
  run_comparison_models: true
  sampling:
    draws: 2000
    tune: 1000
    chains: 4
    target_accept: 0.9

reporting:
  figure_format: "pdf"
  dpi: 300
